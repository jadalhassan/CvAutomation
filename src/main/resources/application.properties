# ===============================
# Spring Boot & Database
# ===============================
spring.datasource.url=jdbc:h2:mem:cvdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# Email Settings
# ===============================
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your-email@example.com
spring.mail.password=your-email-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.example.com

# ===============================
# CV Processing Paths
# ===============================
cv.folder.base=C:/CVs
cv.folder.sb=${cv.folder.base}/sb
cv.folder.mb=${cv.folder.base}/mb
cv.folder.unknown=${cv.folder.base}/unknown
cv.folder.unmatched=${cv.folder.base}/unmatched
cv.folder.unsupported=${cv.folder.base}/unsupported
cv.folder.security=${cv.folder.base}/security
cv.folder.tmp=${java.io.tmpdir}

# ===============================
# Keyword Config
# ===============================
cv.keywords.springboot=Java,Spring Boot,JPA,Hibernate
cv.keywords.mobile=Android,iOS,Flutter,Kotlin,Swift

# ===============================
# Flyweight / Runtime Shared Keys
# (Optional: can be used by Flyweight factory)
# ===============================
cv.flyweight.tracks=SpringBoot,Mobile,Unknown
cv.flyweight.templates.hr=Hello {name}, you are assigned to {track} track.

# ===============================
# Logging (Optional)
# ===============================
logging.level.org.springframework=INFO
logging.level.com.blombank.cvautomation=DEBUG