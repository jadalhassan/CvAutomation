# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/blombank_cv;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── H2 Console ───────────────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Mail (SMTP — outbound HR notifications) ──────────────────────────────────
spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=your-outlook-email@blom.com
spring.mail.password=your-smtp-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# ─── IMAP (inbound mailbox scanning) ──────────────────────────────────────────
app.mail.imap.host=outlook.office365.com
app.mail.imap.port=993
app.mail.username=${APP_MAIL_USERNAME:}
app.mail.password=${APP_MAIL_PASSWORD:}
app.mail.expected-sender=hr-sender@blom.com
app.mail.expected-recipient=cv-inbox@blom.com
app.mail.expected-subject=CV Application
app.mail.hr-recipient=hr-team@blom.com

# ─── Folder Paths ─────────────────────────────────────────────────────────────
app.paths.security-folder=security
app.paths.base-cv-folder=CVs
app.paths.invalid-zip-folder=invalid_zip

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.blombank.cvautomation=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
